blueprint:
  name: Motion Light — Time of Day
  description: >
    Turns a light on when motion is detected, provided illuminance is below a
    threshold. Daytime hours use full brightness and a cool color temperature;
    night hours use a dimmed warm setting. The light turns off after a
    configurable delay once motion clears. Mode: restart — re-triggers reset
    the off-delay timer.
  domain: automation
  input:
    motion_sensor:
      name: Motion sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
    light_target:
      name: Light
      selector:
        entity:
          domain: light
          multiple: true
    illuminance_sensor:
      name: Illuminance sensor
      selector:
        entity:
          domain: sensor
          device_class: illuminance
    illuminance_threshold:
      name: Illuminance threshold (lux)
      description: Skip turning on the light if illuminance is at or above this value.
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
    day_start:
      name: Day start time
      default: "08:00:00"
      selector:
        time:
    night_start:
      name: Night start time
      default: "23:00:00"
      selector:
        time:
    day_brightness:
      name: Day brightness
      default: 254
      selector:
        number:
          min: 1
          max: 255
    day_color_temp:
      name: Day color temperature (K)
      default: 4000
      selector:
        number:
          min: 2000
          max: 6500
          unit_of_measurement: K
          mode: slider
    day_off_delay:
      name: Day off-delay (minutes)
      description: How long to wait after motion clears before turning off during daytime.
      default: 10
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min
    night_brightness:
      name: Night brightness
      default: 77
      selector:
        number:
          min: 1
          max: 255
    night_color_temp:
      name: Night color temperature (K)
      default: 2700
      selector:
        number:
          min: 2000
          max: 6500
          unit_of_measurement: K
          mode: slider
    night_off_delay:
      name: Night off-delay (minutes)
      description: How long to wait after motion clears before turning off during night-time.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

triggers:
  - trigger: state
    entity_id: !input motion_sensor
    to: "on"

conditions:
  - condition: numeric_state
    entity_id: !input illuminance_sensor
    below: !input illuminance_threshold

actions:
  - choose:
      - conditions:
          - condition: time
            after: !input day_start
            before: !input night_start
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness: !input day_brightness
              color_temp_kelvin: !input day_color_temp
          - wait_for_trigger:
              - trigger: state
                entity_id: !input motion_sensor
                to: "off"
          - delay:
              minutes: !input day_off_delay
          - action: light.turn_off
            target:
              entity_id: !input light_target
    default:
      - action: light.turn_on
        target:
          entity_id: !input light_target
        data:
          brightness: !input night_brightness
          color_temp_kelvin: !input night_color_temp
      - wait_for_trigger:
          - trigger: state
            entity_id: !input motion_sensor
            to: "off"
      - delay:
          minutes: !input night_off_delay
      - action: light.turn_off
        target:
          entity_id: !input light_target

mode: restart
